<main class="w-full min-h-svh flex items-center justify-center p-4">

    <div class="w-full max-w-4xl flex bg-white rounded-lg shadow-lg overflow-hidden border border-border">
        <div class="flex flex-col justify-center flex-1 p-8 md:p-12 w-full">

            <div class="mb-8">
                <h1 class="text-2xl font-bold">Log into your account</h1>
                <p class="text-sm text-secondary-text mt-2">Enter your email below to login to your account</p>
            </div>

            <form action="#" method="POST" class="flex flex-col gap-5">

                <div class="flex flex-col gap-2">
                    <label for="email" class="text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" placeholder="me@example.com"
                        class="w-full py-2 px-3 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-border focus:border-transparent">
                </div>

                <div class="flex flex-col gap-2">
                    <div class="flex items-center justify-between">
                        <label for="password" class="text-sm font-medium text-gray-700">Password</label>
                        <a href="#" class="text-sm text-secondary-text hover:text-black hover:underline">Forgot your
                            password?</a>
                    </div>

                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder=""
                        class="w-full py-2 px-3 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-border focus:border-transparent">
                </div>

                <div class="mt-2 flex flex-col gap-3">
                    <button type="submit" class="w-full bg-black text-white py-2 rounded-md cursor-pointer font-medium">
                        Login
                    </button>

                    <button type="button"
                        class="w-full border border-border text-black py-2 cursor-pointer rounded-md font-medium">
                        Login with Google
                    </button>

                    <p class="text-center text-sm text-secondary-text mt-4">
                        Don't have an account?
                        <a href="/signup" class="underline underline-offset-2 cursor-pointer font-medium text-black">
                            Sign up
                        </a>
                    </p>
                </div>
            </form>
        </div>
        <div class="hidden md:block w-1/2">
            <app-auth-banner></app-auth-banner>
        </div>
    </div>
</main>
