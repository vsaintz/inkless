<main class="w-full min-h-svh flex items-center justify-center p-4">

    <div class="w-full max-w-4xl flex bg-white rounded-lg shadow-lg overflow-hidden border border-border">

        <div class="hidden md:block w-1/2">
            <app-auth-banner></app-auth-banner>
        </div>

        <div class="flex flex-col justify-center flex-1 p-8 md:p-12 w-full">

            <div class="mb-8">
                <h1 class="text-2xl font-bold">Create an account</h1>
                <p class="text-sm text-secondary-text mt-2">Enter your details below to create your account</p>
            </div>

            <form action="#" method="POST" class="flex flex-col gap-5">

                <div class="flex flex-col gap-2">
                    <label for="name" class="text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" id="name" name="name" autocomplete="name" placeholder="John Doe"
                        class="w-full py-2 px-3 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-border focus:border-transparent transition-all">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="email" class="text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" placeholder="me@example.com"
                        class="w-full py-2 px-3 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-border focus:border-transparent transition-all">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="password" class="text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" name="password" autocomplete="new-password" placeholder=""
                        class="w-full py-2 px-3 border border-border rounded-md focus:outline-none focus:ring-2 focus:ring-border focus:border-transparent transition-all">
                    <p class="text-xs text-secondary-text">Must be at least 8 characters.</p>
                </div>

                <div class="flex items-center gap-2 mt-1 mb-2">
                    <input id="terms" name="terms" type="checkbox"
                        class="w-4 h-4 text-black border-border rounded focus:ring-black">
                    <label for="terms" class="text-sm text-secondary-text leading-tight">
                        I agree to the <a href="#" class="underline hover:text-black">Terms of Service</a> and <a
                            href="#" class="underline hover:text-black">Privacy Policy</a>
                    </label>
                </div>

                <div class="mt-2 flex flex-col gap-3">
                    <button type="submit" class="w-full bg-black text-white py-2 rounded-md font-medium cursor-pointer">
                        Create account
                    </button>

                    <button type="button"
                        class="w-full border border-border text-black py-2 rounded-md font-medium cursor-pointer">
                        Sign up with Google
                    </button>

                    <p class="text-center text-sm text-secondary-text mt-4">
                        Already have an account?
                        <a href="/signin" class="underline underline-offset-2 cursor-pointer font-medium text-black">
                            Login
                        </a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</main>
